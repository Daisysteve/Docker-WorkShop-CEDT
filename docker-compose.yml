services:

  # TODO(step-5a): ชื่อ service แรกคือ "db"
  db:
    image: postgres:16-alpine          # TODO(step-5b): ใช้ postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workshop
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    # TODO(step-5c): กำหนด healthcheck ให้ db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # TODO(step-5d): ชื่อ service สองคือ "web"
  web:
    build: .                           # TODO(step-5e): build จาก Dockerfile ใน root
    ports:
      - "3000:3000"                    # TODO(step-5f): map port 3000
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/workshop
    # TODO(step-5g): บอกให้ web รอ db healthy ก่อน
    depends_on:
      db:
        condition: service_healthy     # TODO(step-5h): ต้องใช้ condition นี้
    restart: on-failure

volumes:
  pgdata: