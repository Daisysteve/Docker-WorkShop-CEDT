name: Build, Scan, and Push

on:
  # TODO(step-6a): trigger เมื่อ push ไปที่ branch main
  push:
    branches: [main]

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO(step-6b): Login เข้า Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # TODO(step-6c): Build image และตั้ง 2 tags
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/workshop-app:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/workshop-app:${{ github.sha }} \
            .

      # TODO(step-6d): Scan ด้วย Trivy — ถ้าเจอ CRITICAL ให้ fail ทันที
      - name: Scan image with Trivy
        id: scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/workshop-app:latest
          severity: CRITICAL
          exit-code: '1'

      # TODO(step-6e): Push ทั้ง 2 tags ขึ้น Docker Hu
      - name: Push image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/workshop-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/workshop-app:${{ github.sha }}